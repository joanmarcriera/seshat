name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Run SeshatCore tests
        run: cd apple/SeshatCore && swift test

      - name: Generate Xcode project
        run: cd apple && xcodegen generate

      - name: Build (Direct edition, unsigned)
        run: |
          cd apple && xcodebuild -project Seshat.xcodeproj -scheme Seshat \
            -configuration Debug -derivedDataPath build \
            -xcconfig configs/Direct.xcconfig CODE_SIGNING_ALLOWED=NO build
