name: CI

# Development moved to self-hosted Forgejo (git.riera.co.uk); GitHub is a push
# mirror only. Manual dispatch kept as an escape hatch — do not re-enable
# push/PR triggers, they burn the Actions allowance on every mirror sync.
on:
  workflow_dispatch:

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Run DistavoCore tests
        run: cd apple/DistavoCore && swift test

      # Builds WhisperKit/SpeakerKit, so slower than the core tests — but it's
      # what catches an argmax-oss-swift API drift before a release does.
      - name: Run DistavoEmbedded tests
        run: cd apple/DistavoEmbedded && swift test

      - name: Generate Xcode project
        run: cd apple && xcodegen generate

      - name: Build all editions (unsigned)
        run: |
          cd apple
          fail=0
          for edition in Direct Setapp AppStore; do
            echo "::group::Build $edition edition"
            if xcodebuild -project Distavo.xcodeproj -scheme Distavo \
                 -configuration Debug -derivedDataPath "build/$edition" \
                 -xcconfig "configs/$edition.xcconfig" \
                 CODE_SIGNING_ALLOWED=NO build; then
              echo "$edition: OK"
            else
              echo "::error::$edition edition failed to build"; fail=1
            fi
            echo "::endgroup::"
          done
          exit $fail
