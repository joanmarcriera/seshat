name: Bump version after main merge

# Development moved to self-hosted Forgejo (git.riera.co.uk); GitHub is a push
# mirror only, so this must not fire on mirrored pushes (it would also commit
# to GitHub main and diverge from the mirror source). Bump manually instead:
# python3 scripts/bump-minor-version.py, commit with "[skip version bump]".
on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: version-bump-main
  cancel-in-progress: false

jobs:
  bump-minor-version:
    if: >-
      github.actor != 'github-actions[bot]' &&
      !contains(github.event.head_commit.message, '[skip version bump]')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump marketing minor version
        id: bump
        run: |
          set -euo pipefail
          output="$(python3 scripts/bump-minor-version.py)"
          printf '%s\n' "$output"
          version="$(printf '%s\n' "$output" | awk -F= '/^NEW_MARKETING_VERSION=/{print $2}')"
          if [ -z "$version" ]; then
            echo "::error::bump script did not report NEW_MARKETING_VERSION"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Commit version bump
        run: |
          set -euo pipefail
          if git diff --quiet -- apple/project.yml docs/setapp-submission.md ops/site/index.html; then
            echo "No version changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apple/project.yml docs/setapp-submission.md ops/site/index.html
          git commit -m "chore(release): bump version to ${{ steps.bump.outputs.version }} [skip version bump]"
          git push
