name: Release (Direct DMG)

# Unattended: push a tag like `v1.0.0` and this signs (Developer ID), notarizes,
# builds a notarized + stapled DMG, and publishes a GitHub Release with it.
# `workflow_dispatch` does a dry run (builds the DMG as an artifact, no Release).
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   APPLE_TEAM_ID                  10-char Apple Developer Team ID
#   DEVELOPER_ID_CERT_P12_BASE64   base64 of the exported "Developer ID Application" cert (.p12)
#   DEVELOPER_ID_CERT_PASSWORD     password set when exporting that .p12
#   APPLE_ID                       Apple Account email (for notarytool)
#   APPLE_NOTARY_PASSWORD          app-specific password (account.apple.com → App-Specific Passwords)
# See docs/release-automation.md for how to produce each one.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write   # create the GitHub Release + upload the DMG

jobs:
  release-direct:
    runs-on: macos-latest
    env:
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_NOTARY_PASSWORD: ${{ secrets.APPLE_NOTARY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Preflight — required secrets present
        run: |
          missing=()
          for s in APPLE_TEAM_ID DEVELOPER_ID_CERT_P12_BASE64 DEVELOPER_ID_CERT_PASSWORD APPLE_ID APPLE_NOTARY_PASSWORD; do
            [ -n "${!s:-}" ] || missing+=("$s")
          done
          if [ ${#missing[@]} -ne 0 ]; then
            echo "::error::Missing required secrets: ${missing[*]} — see docs/release-automation.md"
            exit 1
          fi
        env:
          DEVELOPER_ID_CERT_P12_BASE64: ${{ secrets.DEVELOPER_ID_CERT_P12_BASE64 }}
          DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Import Developer ID signing certificate
        env:
          CERT_P12_BASE64: ${{ secrets.DEVELOPER_ID_CERT_P12_BASE64 }}
          CERT_P12_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PW="$(uuidgen)"
          echo "$CERT_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" \
            -P "$CERT_P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PW" "$KEYCHAIN" >/dev/null
          # Make the temp keychain the default search list so codesign finds the identity.
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed s/\"//g)
          rm -f "$RUNNER_TEMP/cert.p12"

      - name: Generate project
        run: cd apple && xcodegen generate

      - name: Archive (Direct, Developer ID)
        run: |
          cd apple
          xcodebuild -project Distavo.xcodeproj -scheme Distavo -configuration Release \
            -xcconfig configs/Direct.xcconfig \
            -archivePath build/Distavo-Direct.xcarchive \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            archive

      - name: Export Developer ID app
        run: |
          cd apple
          cat > build/ExportOptions-Direct.plist <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>method</key><string>developer-id</string>
            <key>teamID</key><string>${APPLE_TEAM_ID}</string>
            <key>signingStyle</key><string>manual</string>
            <key>signingCertificate</key><string>Developer ID Application</string>
          </dict></plist>
          PLIST
          xcodebuild -exportArchive \
            -archivePath build/Distavo-Direct.xcarchive \
            -exportOptionsPlist build/ExportOptions-Direct.plist \
            -exportPath build/export

      - name: Notarize and staple the app
        run: |
          cd apple
          APP="build/export/Distavo.app"
          ditto -c -k --keepParent "$APP" build/Distavo-app.zip
          xcrun notarytool submit build/Distavo-app.zip \
            --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_NOTARY_PASSWORD" --wait
          xcrun stapler staple "$APP"

      - name: Build, notarize and staple the DMG
        run: |
          cd apple
          hdiutil create -volname "Distavo" -srcfolder build/export/Distavo.app \
            -ov -format UDZO build/Distavo.dmg
          xcrun notarytool submit build/Distavo.dmg \
            --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_NOTARY_PASSWORD" --wait
          xcrun stapler staple build/Distavo.dmg
          xcrun stapler validate build/Distavo.dmg

      - name: Verify (Gatekeeper)
        run: |
          cd apple
          codesign --verify --strict --verbose=2 build/export/Distavo.app
          spctl -a -vvv --type exec build/export/Distavo.app

      - name: Upload DMG artifact (dry run)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: Distavo-dmg
          path: apple/build/Distavo.dmg

      - name: Publish GitHub Release
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" apple/build/Distavo.dmg \
            --title "Distavo $GITHUB_REF_NAME" --generate-notes \
          || gh release upload "$GITHUB_REF_NAME" apple/build/Distavo.dmg --clobber
