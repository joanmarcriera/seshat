name: Release (App Store upload)

# Builds the sandboxed App Store edition, signs with Apple Distribution, and
# uploads to App Store Connect (where it appears for you to submit to review).
# Review + release stay manual — Apple requires that. Runs on a `v*` tag or
# manual dispatch.
#
# One-time setup before this can run (see docs/release-automation.md):
#   - App record for `uk.co.riera.distavo` created in App Store Connect.
#   - TWO signing certificates exported as .p12 (a Mac App Store .pkg needs both):
#       * "Apple Distribution"               — signs the .app
#       * "3rd Party Mac Developer Installer" — signs the .pkg installer
#   - An App Store Connect API key (.p8) with App Manager role. With Automatic
#     signing (`-allowProvisioningUpdates`) this key lets xcodebuild fetch/manage
#     the Mac App Store provisioning profile itself — so there is no profile secret.
#
# Required repo secrets:
#   APPLE_TEAM_ID                       10-char Team ID
#   APPLE_DISTRIBUTION_CERT_P12_BASE64  base64 of the "Apple Distribution" cert (.p12)
#   APPLE_DISTRIBUTION_CERT_PASSWORD    password set when exporting that .p12
#   APPLE_INSTALLER_CERT_P12_BASE64     base64 of the "3rd Party Mac Developer Installer" cert (.p12)
#   APPLE_INSTALLER_CERT_PASSWORD       password set when exporting that .p12
#   ASC_API_KEY_ID                      App Store Connect API Key ID
#   ASC_API_ISSUER_ID                   App Store Connect API Issuer ID
#   ASC_API_KEY_P8_BASE64               base64 of the API key file (AuthKey_XXXX.p8)

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  upload-appstore:
    runs-on: macos-latest
    env:
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
      ASC_API_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Preflight — required secrets present
        run: |
          missing=()
          for s in APPLE_TEAM_ID APPLE_DISTRIBUTION_CERT_P12_BASE64 APPLE_DISTRIBUTION_CERT_PASSWORD \
                   APPLE_INSTALLER_CERT_P12_BASE64 APPLE_INSTALLER_CERT_PASSWORD \
                   ASC_API_KEY_ID ASC_API_ISSUER_ID ASC_API_KEY_P8_BASE64; do
            [ -n "${!s:-}" ] || missing+=("$s")
          done
          if [ ${#missing[@]} -ne 0 ]; then
            echo "::error::Missing required secrets: ${missing[*]} — see docs/release-automation.md"
            exit 1
          fi
        env:
          APPLE_DISTRIBUTION_CERT_P12_BASE64: ${{ secrets.APPLE_DISTRIBUTION_CERT_P12_BASE64 }}
          APPLE_DISTRIBUTION_CERT_PASSWORD: ${{ secrets.APPLE_DISTRIBUTION_CERT_PASSWORD }}
          APPLE_INSTALLER_CERT_P12_BASE64: ${{ secrets.APPLE_INSTALLER_CERT_P12_BASE64 }}
          APPLE_INSTALLER_CERT_PASSWORD: ${{ secrets.APPLE_INSTALLER_CERT_PASSWORD }}
          ASC_API_KEY_P8_BASE64: ${{ secrets.ASC_API_KEY_P8_BASE64 }}

      - name: Install xcodegen
        run: brew install xcodegen

      # A Mac App Store .pkg needs TWO identities: the "Apple Distribution" cert
      # signs the .app, and the "3rd Party Mac Developer Installer" cert signs the
      # .pkg installer (productsign, during -exportArchive). Import both into one
      # throwaway keychain, then run set-key-partition-list ONCE after both imports
      # so codesign/productsign can use them non-interactively.
      - name: Import signing certificates (application + installer)
        env:
          APP_CERT_P12_BASE64: ${{ secrets.APPLE_DISTRIBUTION_CERT_P12_BASE64 }}
          APP_CERT_P12_PASSWORD: ${{ secrets.APPLE_DISTRIBUTION_CERT_PASSWORD }}
          INSTALLER_CERT_P12_BASE64: ${{ secrets.APPLE_INSTALLER_CERT_P12_BASE64 }}
          INSTALLER_CERT_P12_PASSWORD: ${{ secrets.APPLE_INSTALLER_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PW="$(uuidgen)"
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"

          echo "$APP_CERT_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/app-cert.p12"
          security import "$RUNNER_TEMP/app-cert.p12" -k "$KEYCHAIN" \
            -P "$APP_CERT_P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security

          echo "$INSTALLER_CERT_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/installer-cert.p12"
          security import "$RUNNER_TEMP/installer-cert.p12" -k "$KEYCHAIN" \
            -P "$INSTALLER_CERT_P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productsign -T /usr/bin/security

          security set-key-partition-list -S apple-tool:,apple:,codesign:,productsign: -s -k "$KEYCHAIN_PW" "$KEYCHAIN" >/dev/null
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed s/\"//g)
          rm -f "$RUNNER_TEMP/app-cert.p12" "$RUNNER_TEMP/installer-cert.p12"

          echo "Signing identities now available (expect Apple Distribution + 3rd Party Mac Developer Installer):"
          security find-identity -v "$KEYCHAIN" || true

      - name: Install App Store Connect API key
        env:
          ASC_API_KEY_P8_BASE64: ${{ secrets.ASC_API_KEY_P8_BASE64 }}
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/private_keys"
          echo "$ASC_API_KEY_P8_BASE64" | base64 --decode \
            > "$RUNNER_TEMP/private_keys/AuthKey_${ASC_API_KEY_ID}.p8"
          # Also stage in the standard location xcodebuild's exporter + altool look for
          # (xcodebuild IDEDistribution often ignores -authenticationKeyPath).
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          cp "$RUNNER_TEMP/private_keys/AuthKey_${ASC_API_KEY_ID}.p8" \
            "$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_API_KEY_ID}.p8"

      - name: Generate project
        run: cd apple && xcodegen generate

      # Automatic signing: the imported certs sign the .app/.pkg, and
      # -allowProvisioningUpdates lets xcodebuild fetch/manage the Mac App Store
      # provisioning profile via the App Store Connect API key (App-Manager role is
      # enough for profile management — it just can't mint distribution *certs*,
      # which is why we import those above). The Distavo-AppStore scheme pins the
      # sandboxed AppStore.xcconfig (bundle id + app-sandbox entitlements).
      - name: Archive (App Store, automatic signing)
        run: |
          cd apple
          xcodebuild -project Distavo.xcodeproj -scheme Distavo-AppStore \
            -archivePath build/Distavo-AppStore.xcarchive \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$RUNNER_TEMP/private_keys/AuthKey_${ASC_API_KEY_ID}.p8" \
            -authenticationKeyID "$ASC_API_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_API_ISSUER_ID" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_STYLE=Automatic \
            archive

      - name: Export the App Store package
        run: |
          cd apple
          cat > build/ExportOptions-AppStore.plist <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          # Pin the signing certs explicitly: bare automatic export lets xcodebuild's
          # cert auto-selection grab the *installer* cert to sign the .app code, which
          # fails ("this identity cannot be used for signing code"). The .app is signed
          # with "Apple Distribution"; the .pkg installer with "3rd Party Mac Developer
          # Installer". The profile is still resolved via -allowProvisioningUpdates below.
          <plist version="1.0"><dict>
            <key>method</key><string>app-store-connect</string>
            <key>teamID</key><string>${APPLE_TEAM_ID}</string>
            <key>destination</key><string>export</string>
            <key>signingStyle</key><string>manual</string>
            <key>signingCertificate</key><string>Apple Distribution</string>
            <key>installerSigningCertificate</key><string>3rd Party Mac Developer Installer</string>
          </dict></plist>
          PLIST
          xcodebuild -exportArchive \
            -archivePath build/Distavo-AppStore.xcarchive \
            -exportOptionsPlist build/ExportOptions-AppStore.plist \
            -exportPath build/export-appstore \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$RUNNER_TEMP/private_keys/AuthKey_${ASC_API_KEY_ID}.p8" \
            -authenticationKeyID "$ASC_API_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_API_ISSUER_ID"

      - name: Upload to App Store Connect
        run: |
          cd apple
          # altool reads the key from a standard private_keys dir; xcodebuild's own
          # destination=upload uploader does not reliably honor -authenticationKey*.
          # NOTE: `altool --upload-app` is deprecated (works today). Migrate to
          # `xcrun notarytool`/the App Store Connect upload API before it's removed.
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          cp "$RUNNER_TEMP/private_keys/AuthKey_${ASC_API_KEY_ID}.p8" "$HOME/.appstoreconnect/private_keys/"
          pkg="$(ls build/export-appstore/*.pkg | head -1)"
          echo "Uploading $pkg"
          xcrun altool --upload-app -f "$pkg" -t macos \
            --apiKey "$ASC_API_KEY_ID" --apiIssuer "$ASC_API_ISSUER_ID"
