name: Release (App Store upload)

# Builds the sandboxed App Store edition, signs with Apple Distribution,
# uploads to App Store Connect, then — after a human approves the
# `app-store-submission` environment gate — submits the build to App Review
# via scripts/submit-appstore-review.py (release type: after approval, so an
# approved version goes live on its own). Runs on a `v*` tag or manual
# dispatch. Retry/staged-test path: submit-appstore.yml.
#
# One-time setup before this can run (see docs/release-automation.md):
#   - App record for `uk.co.riera.distavo` created in App Store Connect.
#   - TWO signing certificates exported as .p12 (a Mac App Store .pkg needs both):
#       * "Apple Distribution"               — signs the .app
#       * "3rd Party Mac Developer Installer" — signs the .pkg installer
#   - A Mac App Store provisioning profile for `uk.co.riera.distavo`, exported
#     as a repository secret. TestFlight expects the main .app bundle to embed it.
#   - An App Store Connect API key (.p8) with App Manager role.
#
# Required repo secrets:
#   APPLE_TEAM_ID                       10-char Team ID
#   APPLE_DISTRIBUTION_CERT_P12_BASE64  base64 of the "Apple Distribution" cert (.p12)
#   APPLE_DISTRIBUTION_CERT_PASSWORD    password set when exporting that .p12
#   APPLE_INSTALLER_CERT_P12_BASE64     base64 of the "3rd Party Mac Developer Installer" cert (.p12)
#   APPLE_INSTALLER_CERT_PASSWORD       password set when exporting that .p12
#   MAC_APP_STORE_PROVISIONING_PROFILE_BASE64
#                                         base64 of the Mac App Store .provisionprofile
#   ASC_API_KEY_ID                      App Store Connect API Key ID
#   ASC_API_ISSUER_ID                   App Store Connect API Issuer ID
#   ASC_API_KEY_P8_BASE64               base64 of the API key file (AuthKey_XXXX.p8)

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  upload-appstore:
    runs-on: macos-latest
    timeout-minutes: 30
    env:
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
      ASC_API_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}
    steps:
      - uses: actions/checkout@v4

      # The submit job needs release notes; fail here, before 20+ minutes of
      # building, rather than after the upload.
      - name: Preflight — What's New release notes present
        run: |
          f="apple/metadata/whats-new/en-GB.txt"
          if [ ! -s "$f" ]; then
            echo "::error::$f is missing or empty — write the release notes before tagging"
            exit 1
          fi

      - name: Preflight — required secrets present
        run: |
          missing=()
          for s in APPLE_TEAM_ID APPLE_DISTRIBUTION_CERT_P12_BASE64 APPLE_DISTRIBUTION_CERT_PASSWORD \
                   APPLE_INSTALLER_CERT_P12_BASE64 APPLE_INSTALLER_CERT_PASSWORD \
                   MAC_APP_STORE_PROVISIONING_PROFILE_BASE64 \
                   ASC_API_KEY_ID ASC_API_ISSUER_ID ASC_API_KEY_P8_BASE64; do
            [ -n "${!s:-}" ] || missing+=("$s")
          done
          if [ ${#missing[@]} -ne 0 ]; then
            echo "::error::Missing required secrets: ${missing[*]} — see docs/release-automation.md"
            exit 1
          fi
        env:
          APPLE_DISTRIBUTION_CERT_P12_BASE64: ${{ secrets.APPLE_DISTRIBUTION_CERT_P12_BASE64 }}
          APPLE_DISTRIBUTION_CERT_PASSWORD: ${{ secrets.APPLE_DISTRIBUTION_CERT_PASSWORD }}
          APPLE_INSTALLER_CERT_P12_BASE64: ${{ secrets.APPLE_INSTALLER_CERT_P12_BASE64 }}
          APPLE_INSTALLER_CERT_PASSWORD: ${{ secrets.APPLE_INSTALLER_CERT_PASSWORD }}
          MAC_APP_STORE_PROVISIONING_PROFILE_BASE64: ${{ secrets.MAC_APP_STORE_PROVISIONING_PROFILE_BASE64 }}
          ASC_API_KEY_P8_BASE64: ${{ secrets.ASC_API_KEY_P8_BASE64 }}

      - name: Install xcodegen
        run: brew install xcodegen

      # A Mac App Store .pkg needs TWO identities: the "Apple Distribution" cert
      # signs the .app, and the "3rd Party Mac Developer Installer" cert signs the
      # .pkg installer (productsign, during -exportArchive). Import both into one
      # throwaway keychain, then run set-key-partition-list ONCE after both imports
      # so codesign/productsign can use them non-interactively.
      - name: Import signing certificates (application + installer)
        timeout-minutes: 5
        env:
          APP_CERT_P12_BASE64: ${{ secrets.APPLE_DISTRIBUTION_CERT_P12_BASE64 }}
          APP_CERT_P12_PASSWORD: ${{ secrets.APPLE_DISTRIBUTION_CERT_PASSWORD }}
          INSTALLER_CERT_P12_BASE64: ${{ secrets.APPLE_INSTALLER_CERT_P12_BASE64 }}
          INSTALLER_CERT_P12_PASSWORD: ${{ secrets.APPLE_INSTALLER_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PW="$(uuidgen)"
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"

          echo "$APP_CERT_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/app-cert.p12"
          security import "$RUNNER_TEMP/app-cert.p12" -k "$KEYCHAIN" \
            -P "$APP_CERT_P12_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/productbuild -T /usr/bin/productsign -T /usr/bin/security

          echo "$INSTALLER_CERT_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/installer-cert.p12"
          security import "$RUNNER_TEMP/installer-cert.p12" -k "$KEYCHAIN" \
            -P "$INSTALLER_CERT_P12_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/productbuild -T /usr/bin/productsign -T /usr/bin/security

          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PW" "$KEYCHAIN" >/dev/null
          security default-keychain -d user -s "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed s/\"//g)
          rm -f "$RUNNER_TEMP/app-cert.p12" "$RUNNER_TEMP/installer-cert.p12"

          echo "Signing identities now available (expect Apple Distribution + 3rd Party Mac Developer Installer):"
          security find-identity -v "$KEYCHAIN" || true

          app_identity="$(security find-identity -v "$KEYCHAIN" | awk '/"Apple Distribution:/{print $2; exit}')"
          installer_identity="$(security find-identity -v "$KEYCHAIN" | awk '/"3rd Party Mac Developer Installer:/{print $2; exit}')"
          if [ -z "$app_identity" ] || [ -z "$installer_identity" ]; then
            echo "::error::Expected Apple Distribution and 3rd Party Mac Developer Installer identities in the temporary keychain"
            exit 1
          fi
          {
            echo "DISTAVO_APP_SIGNING_IDENTITY=$app_identity"
            echo "DISTAVO_INSTALLER_SIGNING_IDENTITY=$installer_identity"
          } >> "$GITHUB_ENV"

      - name: Verify installer signing access
        timeout-minutes: 5
        run: |
          set -euo pipefail
          probe_root="$(mktemp -d)"
          mkdir -p "$probe_root/usr/local/share/distavo"
          printf 'Distavo installer signing probe\n' > "$probe_root/usr/local/share/distavo/probe.txt"
          /usr/bin/productbuild --root "$probe_root" / \
            --sign "$DISTAVO_INSTALLER_SIGNING_IDENTITY" \
            "$RUNNER_TEMP/distavo-installer-signing-probe.pkg"
          pkgutil --check-signature "$RUNNER_TEMP/distavo-installer-signing-probe.pkg"

      - name: Install App Store Connect API key
        timeout-minutes: 3
        env:
          ASC_API_KEY_P8_BASE64: ${{ secrets.ASC_API_KEY_P8_BASE64 }}
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/private_keys"
          echo "$ASC_API_KEY_P8_BASE64" | base64 --decode \
            > "$RUNNER_TEMP/private_keys/AuthKey_${ASC_API_KEY_ID}.p8"
          # Also stage in the standard location xcodebuild's exporter + altool look for
          # (xcodebuild IDEDistribution often ignores -authenticationKeyPath).
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          cp "$RUNNER_TEMP/private_keys/AuthKey_${ASC_API_KEY_ID}.p8" \
            "$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_API_KEY_ID}.p8"

      - name: Install App Store provisioning profile
        timeout-minutes: 3
        env:
          PROFILE_BASE64: ${{ secrets.MAC_APP_STORE_PROVISIONING_PROFILE_BASE64 }}
        run: |
          set -euo pipefail
          profile_src="$RUNNER_TEMP/distavo-appstore.provisionprofile"
          profile_plist="$RUNNER_TEMP/distavo-appstore-profile.plist"
          printf '%s' "$PROFILE_BASE64" | base64 --decode > "$profile_src"
          security cms -D -i "$profile_src" > "$profile_plist"

          profile_uuid="$(/usr/libexec/PlistBuddy -c 'Print UUID' "$profile_plist")"
          profile_name="$(/usr/libexec/PlistBuddy -c 'Print Name' "$profile_plist")"
          profile_team="$(/usr/libexec/PlistBuddy -c 'Print TeamIdentifier:0' "$profile_plist")"
          profile_app_id="$(/usr/libexec/PlistBuddy -c 'Print Entitlements:application-identifier' "$profile_plist" 2>/dev/null || \
            /usr/libexec/PlistBuddy -c 'Print Entitlements:com.apple.application-identifier' "$profile_plist")"
          profile_team_entitlement="$(/usr/libexec/PlistBuddy -c 'Print Entitlements:com.apple.developer.team-identifier' "$profile_plist")"
          get_task_allow="$(/usr/libexec/PlistBuddy -c 'Print Entitlements:get-task-allow' "$profile_plist" 2>/dev/null || true)"

          expected_app_id="${APPLE_TEAM_ID}.uk.co.riera.distavo"
          if [[ "$profile_team" != "$APPLE_TEAM_ID" || "$profile_team_entitlement" != "$APPLE_TEAM_ID" ]]; then
            echo "::error::Provisioning profile belongs to team '$profile_team'/'$profile_team_entitlement', expected '$APPLE_TEAM_ID'"
            exit 1
          fi
          if [[ "$profile_app_id" != "$expected_app_id" ]]; then
            echo "::error::Provisioning profile app id is '$profile_app_id', expected '$expected_app_id'"
            exit 1
          fi
          if [[ "$get_task_allow" == "true" ]]; then
            echo "::error::Provisioning profile has get-task-allow=true; use a Mac App Store distribution profile"
            exit 1
          fi

          profile_dir="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$profile_dir"
          cp "$profile_src" "$profile_dir/$profile_uuid.provisionprofile"

          {
            echo "DISTAVO_APPSTORE_PROFILE_UUID=$profile_uuid"
            echo "DISTAVO_APPSTORE_PROFILE_NAME=$profile_name"
          } >> "$GITHUB_ENV"

          echo "Installed provisioning profile '$profile_name' ($profile_uuid)"

      - name: Generate project
        run: cd apple && xcodegen generate

      # Manual signing: pin the Apple Distribution identity and the Mac App Store
      # provisioning profile so the archived app contains Contents/embedded.provisionprofile.
      # Without that profile Apple accepts delivery but marks the build ineligible
      # for TestFlight (ITMS-90889).
      - name: Archive (App Store, manual signing)
        timeout-minutes: 10
        run: |
          set -euo pipefail
          cd apple
          xcodebuild -project Distavo.xcodeproj -scheme Distavo-AppStore \
            -archivePath build/Distavo-AppStore.xcarchive \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="$DISTAVO_APP_SIGNING_IDENTITY" \
            PROVISIONING_PROFILE_SPECIFIER="$DISTAVO_APPSTORE_PROFILE_NAME" \
            archive

          embedded_profile="build/Distavo-AppStore.xcarchive/Products/Applications/Distavo.app/Contents/embedded.provisionprofile"
          if [[ ! -f "$embedded_profile" ]]; then
            echo "::error::Archived Distavo.app is missing Contents/embedded.provisionprofile"
            exit 1
          fi

          security cms -D -i "$embedded_profile" > build/Archive-EmbeddedProfile.plist
          archived_profile_uuid="$(/usr/libexec/PlistBuddy -c 'Print UUID' build/Archive-EmbeddedProfile.plist)"
          if [[ "$archived_profile_uuid" != "$DISTAVO_APPSTORE_PROFILE_UUID" ]]; then
            echo "::error::Archived profile UUID '$archived_profile_uuid' did not match expected '$DISTAVO_APPSTORE_PROFILE_UUID'"
            exit 1
          fi

      - name: Export the App Store package
        timeout-minutes: 15
        run: |
          set -euo pipefail
          cd apple
          # Pin the signing certs explicitly: bare automatic export lets xcodebuild's
          # cert auto-selection grab the *installer* cert to sign the .app code, which
          # fails ("this identity cannot be used for signing code"). The .app is signed
          # with "Apple Distribution"; the .pkg installer with "3rd Party Mac Developer
          # Installer". The provisioning profile is pinned explicitly so TestFlight can
          # identify the main bundle as provisioned.
          # NB: these comments live OUTSIDE the heredoc — '#' inside <<PLIST is literal
          # text and would corrupt the plist ("isn't in the correct format").
          cat > build/ExportOptions-AppStore.plist <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>method</key><string>app-store-connect</string>
            <key>teamID</key><string>${APPLE_TEAM_ID}</string>
            <key>destination</key><string>export</string>
            <key>signingStyle</key><string>manual</string>
            <key>signingCertificate</key><string>${DISTAVO_APP_SIGNING_IDENTITY}</string>
            <key>installerSigningCertificate</key><string>${DISTAVO_INSTALLER_SIGNING_IDENTITY}</string>
            <key>provisioningProfiles</key><dict>
              <key>uk.co.riera.distavo</key><string>${DISTAVO_APPSTORE_PROFILE_UUID}</string>
            </dict>
          </dict></plist>
          PLIST
          plutil -lint build/ExportOptions-AppStore.plist
          xcodebuild -exportArchive \
            -archivePath build/Distavo-AppStore.xcarchive \
            -exportOptionsPlist build/ExportOptions-AppStore.plist \
            -exportPath build/export-appstore \
            -verbose
          pkg="$(find build/export-appstore -maxdepth 1 -name '*.pkg' -print -quit)"
          if [ -z "$pkg" ]; then
            echo "::error::xcodebuild export completed without producing a .pkg"
            find build/export-appstore -maxdepth 2 -print || true
            exit 1
          fi
          pkgutil --check-signature "$pkg"
          payload_files="$(pkgutil --payload-files "$pkg")"
          if ! printf '%s\n' "$payload_files" | grep -Fqx 'Distavo.app/Contents/embedded.provisionprofile' &&
             ! printf '%s\n' "$payload_files" | grep -Fqx './Distavo.app/Contents/embedded.provisionprofile'; then
            echo "::error::Exported pkg payload is missing Distavo.app/Contents/embedded.provisionprofile"
            printf '%s\n' "$payload_files" | sed -n '1,120p'
            exit 1
          fi

      - name: Upload to App Store Connect
        timeout-minutes: 10
        run: |
          set -euo pipefail
          cd apple
          # altool reads the key from a standard private_keys dir; xcodebuild's own
          # destination=upload uploader does not reliably honor -authenticationKey*.
          # NOTE: `altool --upload-app` is deprecated (works today). Migrate to
          # `xcrun notarytool`/the App Store Connect upload API before it's removed.
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          cp "$RUNNER_TEMP/private_keys/AuthKey_${ASC_API_KEY_ID}.p8" "$HOME/.appstoreconnect/private_keys/"
          pkg="$(find build/export-appstore -maxdepth 1 -name '*.pkg' -print -quit)"
          if [ -z "$pkg" ]; then
            echo "::error::No exported .pkg found in build/export-appstore"
            exit 1
          fi
          echo "Uploading $pkg"
          upload_log="$RUNNER_TEMP/altool-upload.log"
          set +e
          xcrun altool --upload-app -f "$pkg" -t macos \
            --apiKey "$ASC_API_KEY_ID" --apiIssuer "$ASC_API_ISSUER_ID" 2>&1 | tee "$upload_log"
          altool_status=${PIPESTATUS[0]}
          set -e
          if [ "$altool_status" -ne 0 ]; then
            echo "::error::altool upload failed (exit $altool_status)"
            exit "$altool_status"
          fi
          # A clean exit is NOT enough: altool returns 0 even when Apple flags the
          # build as TestFlight-ineligible because the main bundle is missing a
          # provisioning profile (ITMS-90889). That warning is precisely the bug we
          # are fixing, so treat it as a hard failure — a green release must mean a
          # TestFlight-eligible build was delivered, not merely "accepted".
          if grep -Eq '90889|missing a provisioning profile' "$upload_log"; then
            echo "::error::Upload accepted but Apple reports the main bundle is missing a provisioning profile (ITMS-90889) — build is not TestFlight-eligible"
            exit 1
          fi

  # Pauses (billing nothing) until the `app-store-submission` environment's
  # required reviewer approves, then waits for Apple to process the build and
  # submits it to App Review. Pure REST — a cheap Linux runner is enough.
  # If it fails or times out it is safe to re-run, or use submit-appstore.yml.
  submit-for-review:
    needs: upload-appstore
    runs-on: ubuntu-latest
    environment: app-store-submission
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install --quiet 'PyJWT[crypto]==2.10.1' 'requests==2.32.4'

      - name: Submit for review
        env:
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}
          ASC_API_KEY_P8_BASE64: ${{ secrets.ASC_API_KEY_P8_BASE64 }}
        run: python3 scripts/submit-appstore-review.py --until submit
