# XcodeGen spec — generates Scribed.xcodeproj (committable, diff-able).
# Regenerate after editing:  cd apple && xcodegen generate
name: Scribed
options:
  bundleIdPrefix: uk.co.riera
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Manual
packages:
  ScribedCore:
    path: ScribedCore
targets:
  Scribed:
    type: application
    platform: macOS
    configFiles:
      Debug: configs/Direct.xcconfig
      Release: configs/Direct.xcconfig
    dependencies:
      - package: ScribedCore
    sources:
      - path: Sources
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_LSUIElement: YES
        INFOPLIST_KEY_CFBundleDisplayName: Scribed
        INFOPLIST_KEY_NSHumanReadableCopyright: "© 2026 Joan Marc Riera Duocastella · MIT"
schemes:
  Scribed:
    build:
      targets:
        Scribed: all
    run:
      config: Debug
