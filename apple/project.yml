# XcodeGen spec — generates Distavo.xcodeproj (committable, diff-able).
# Regenerate after editing:  cd apple && xcodegen generate
name: Distavo
options:
  bundleIdPrefix: uk.co.riera
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
# Three build configurations from one target, each pinned to an edition xcconfig
# below: Debug/Release build the Direct edition; Release-AppStore builds the
# sandboxed Mac App Store edition. The release-appstore.yml workflow archives the
# `Distavo-AppStore` scheme so the App Store build provably uses AppStore.xcconfig
# (bundle id + app-sandbox entitlements) rather than a fragile -xcconfig override.
configs:
  Debug: debug
  Release: release
  Release-AppStore: release
settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.2.0"
    CURRENT_PROJECT_VERSION: "3"
    # Left empty on purpose: CI (release*.yml) and scripts/build-and-notarize.sh
    # inject the real Team ID via `DEVELOPMENT_TEAM=<id>` on the xcodebuild line.
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Manual
packages:
  DistavoCore:
    path: DistavoCore
targets:
  Distavo:
    type: application
    platform: macOS
    configFiles:
      Debug: configs/Direct.xcconfig
      Release: configs/Direct.xcconfig
      Release-AppStore: configs/AppStore.xcconfig
    dependencies:
      - package: DistavoCore
    sources:
      - path: Sources
      - path: Resources
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_LSUIElement: YES
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.productivity
        INFOPLIST_KEY_CFBundleDisplayName: Distavo
        INFOPLIST_KEY_NSHumanReadableCopyright: "© 2026 Joan Marc Riera Duocastella · MIT"
        INFOPLIST_KEY_NSAppleEventsUsageDescription: "Distavo opens Terminal to run the optional install commands you choose."
        INFOPLIST_KEY_NSLocalNetworkUsageDescription: "Distavo connects to the WhisperX and Ollama servers you run on your local network to transcribe and summarise recordings."
schemes:
  Distavo:
    build:
      targets:
        Distavo: all
    run:
      config: Debug
  # App Store edition. `xcodebuild -scheme Distavo-AppStore archive` (no
  # -configuration) uses the archive action's config below = Release-AppStore,
  # which maps to configs/AppStore.xcconfig via the target's configFiles.
  Distavo-AppStore:
    build:
      targets:
        Distavo: all
    run:
      config: Release-AppStore
    archive:
      config: Release-AppStore
